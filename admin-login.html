<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
     <div class="login-page">

        <div class="side-panel">
            <h1>Muscle Monk Gymnasium</h1>
            <p>Train hard, stay consistent, and become the strongest version of yourself. Open daily 6 AM – 10 PM.</p>

            <div class="socials">
                <a href="#"><i class='bx bxl-instagram'></i></a>
                <a href="#"><i class='bx bxl-facebook'></i></a>
                <a href="#"><i class='bx bxl-whatsapp'></i></a>
            </div>
        </div>
    <div class="wrapper">
        <form action="admin-dashboard.html">
            <h1>Login</h1>

            <div class="role-toggle">
                <a href="login.html" class="role-btn">Member</a>
                <a href="admin-login.html" class="role-btn active">Gym Admin</a>
            </div>

            <div class="input-box">
                <input type="text" placeholder="Username" required> 
                <i class='bx bx-user-circle'></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required> 
                <i class='bx bx-lock'></i>
            </div>
            <div class="remember-forget">
               <label> <input type="checkbox">Remember me</label>
               <a href="#">Forgot password</a>
            </div>
            <button type="submit" class="btn">Login</button>
              <div class="register-link">
                <p>Don't have an account? <a href="register.html">Register</a></p>
            </div>
        </form>
    </div>
</body>
</html>
